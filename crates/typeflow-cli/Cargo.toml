[package]
name = "typeflow-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[[bin]]
name = "typeflow"
path = "src/main.rs"

[dependencies]
typeflow-core = { path = "../typeflow-core" }
crossterm = "0.29"
fst = "0.4"
toml = "0.8"
serde = { version = "1", features = ["derive"] }
