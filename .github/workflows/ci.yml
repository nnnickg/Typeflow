name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          rustup show
          cargo --version
          rustc --version

      - name: Cache
        uses: Swatinem/rust-cache@v2.8.1

      - name: Test
        run: cargo test --workspace --locked

      - name: Fuzz Targets
        run: cargo build --manifest-path fuzz/Cargo.toml --bins --locked

  coverage:
    name: Core Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache
        uses: Swatinem/rust-cache@v2.8.1

      - name: Install Coverage Tool
        run: cargo install cargo-llvm-cov --version 0.8.6 --locked

      - name: typeclaw-core Line Coverage
        run: cargo llvm-cov -p typeclaw-core --locked --summary-only --fail-under-lines 40

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          rustup show
          cargo --version
          rustc --version
          swift --version
          xcodebuild -version

      - name: Cache
        uses: Swatinem/rust-cache@v2.8.1

      - name: Install Cargo Tools
        run: |
          cargo install --locked cargo-deny --version 0.19.4
          cargo install --locked cbindgen --version 0.29.2

      - name: Format
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Dependency Policy
        run: cargo deny check

      - name: FFI Header
        run: cbindgen --quiet --config cbindgen.toml --crate typeclaw-ffi --output crates/typeclaw-ffi/include/typeclaw.h --verify

      - name: Fuzz Targets
        run: cargo build --manifest-path fuzz/Cargo.toml --bins --locked

      - name: Release Build
        run: cargo build --release --locked -p typeclaw-cli -p typeclaw-ffi

      - name: CLI Smoke
        run: |
          touch "$RUNNER_TEMP/typeclaw-empty.toml"
          target/release/typeclaw --config "$RUNNER_TEMP/typeclaw-empty.toml" model
          target/release/typeclaw --config "$RUNNER_TEMP/typeclaw-empty.toml" predict ghsdbn
          target/release/typeclaw --config "$RUNNER_TEMP/typeclaw-empty.toml" pack inspect uk
          target/release/typeclaw --config "$RUNNER_TEMP/typeclaw-empty.toml" eval --generated 500
          target/release/typeclaw completions zsh >/dev/null

      - name: macOS Staticlib Smoke
        run: make -C macos smoke CARGO_TARGET_DIR="$PWD/target" BUILD_DIR="$RUNNER_TEMP/typeclaw-macos-build"

      - name: SwiftPM Build
        run: |
          CARGO_TARGET_DIR="$PWD/target" RUST_PROFILE=release xcrun swift run --package-path macos -c release typeclaw-staticlib-smoke
          CARGO_TARGET_DIR="$PWD/target" RUST_PROFILE=release xcrun swift build --package-path macos -c release --product TypeClaw

      - name: macOS Bundle Build
        run: make -C macos bundle CARGO_TARGET_DIR="$PWD/target" BUILD_DIR="$RUNNER_TEMP/typeclaw-macos-build"
